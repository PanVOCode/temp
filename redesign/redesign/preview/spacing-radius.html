<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .box { width:80px; height:60px; background:#fff; border:1px solid #000; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; letter-spacing:0.1em; color:#000; }
  .box.r0 { border-radius:0; }
  .box.dot { width:auto; height:auto; padding:0; border:none; gap:8px; }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Corners — the system is square</div>
  <div class="row" style="gap:18px; align-items:center;">
    <div class="box r0">0px</div>
    <span class="atpm-tag" style="max-width:240px;">Radius is 0 everywhere — cards, buttons, inputs, photos. Structure comes from hairlines, not rounding.</span>
    <div class="box dot"><span style="width:6px;height:6px;border-radius:50%;background:var(--atpm-accent);display:block;"></span><span class="atpm-tag">only the status dot is round</span></div>
  </div>
</div></body></html>

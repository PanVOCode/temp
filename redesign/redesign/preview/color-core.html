<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:0; flex:1; }
  .chip { height:64px; border:1px solid rgba(0,0,0,0.15); }
  .meta { display:flex; justify-content:space-between; padding:6px 2px 0; }
  .nm { font-size:10px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }
  .hx { font-size:9px; letter-spacing:0.1em; color:var(--atpm-grey-50); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Core palette</div>
  <div class="row" style="gap:10px; align-items:stretch;">
    <div class="sw"><div class="chip" style="background:#F3F3F3;"></div><div class="meta"><span class="nm">Paper</span><span class="hx">#F3F3F3</span></div></div>
    <div class="sw"><div class="chip" style="background:#111111;"></div><div class="meta"><span class="nm">Ink</span><span class="hx">#111111</span></div></div>
    <div class="sw"><div class="chip" style="background:#000000;"></div><div class="meta"><span class="nm">Black</span><span class="hx">#000000</span></div></div>
    <div class="sw"><div class="chip" style="background:#FFFFFF;"></div><div class="meta"><span class="nm">White</span><span class="hx">#FFFFFF</span></div></div>
    <div class="sw"><div class="chip" style="background:#FF6A00;"></div><div class="meta"><span class="nm">Accent</span><span class="hx">#FF6A00</span></div></div>
  </div>
</div></body></html>

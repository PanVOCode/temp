<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .b { display:inline-flex; align-items:center; gap:10px; padding:14px 26px; font-family:var(--font-sans); font-weight:800; font-size:11px; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border:1px solid #000; }
  .solid { background:#000; color:#fff; }
  .outline { background:transparent; color:#000; }
  .white { background:#fff; color:#000; border-color:#000; }
  .accent { background:var(--atpm-accent); color:#fff; border-color:var(--atpm-accent); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Buttons — square · uppercase · arrow</div>
  <div class="row" style="gap:12px;">
    <span class="b solid">Позвонить<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    <span class="b outline">Каталог<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    <span class="b white">Запросить КП<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
    <span class="b accent">Hover →<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span>
  </div>
  <div class="atpm-tag">Hover flips fill → orange · no radius · no shadow</div>
</div></body></html>

<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .stage { position:relative; flex:1; height:108px; background:#060606; overflow:hidden; }
  .stage img { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(1.5); height:100%; object-fit:contain; }
  .ghost { position:absolute; bottom:-0.18em; right:-0.02em; font-weight:800; font-stretch:expanded; font-size:140px; line-height:1; letter-spacing:-0.05em; color:rgba(255,255,255,0.06); z-index:0; }
  .stage.light { background:#F0F0EE; }
  .stage.light .ghost { color:rgba(0,0,0,0.05); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Imagery — mould photography + ghost index</div>
  <div class="row" style="gap:10px; align-items:stretch;">
    <div class="stage light"><span class="ghost">01</span><img src="../assets/photo-atpm-mold.png" alt=""></div>
    <div class="stage"><span class="ghost">02</span><img src="../assets/photo-mold-nobg.png" alt="" style="transform:translate(-50%,-50%) scale(1.25);"></div>
  </div>
</div></body></html>

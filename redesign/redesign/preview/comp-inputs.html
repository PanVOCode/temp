<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; flex:1; }
  .lbl { font-size:9px; font-weight:500; letter-spacing:0.2em; text-transform:uppercase; color:var(--atpm-grey-50); }
  .inp { border:1px solid #000; background:#fff; padding:12px 14px; font-family:var(--font-sans); font-size:13px; color:#000; }
  .inp.focus { outline:2px solid var(--atpm-accent); outline-offset:2px; }
  .ph { color:var(--atpm-grey-40); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Form inputs — square · hairline</div>
  <div class="row" style="gap:14px; align-items:stretch;">
    <div class="field"><span class="lbl">Имя</span><div class="inp ph">Александр Семенец</div></div>
    <div class="field"><span class="lbl">Телефон</span><div class="inp focus">+7 (991) 097-90-59</div></div>
    <div class="field"><span class="lbl">Чертёж / 3D-модель</span><div class="inp ph">Прикрепить файл …</div></div>
  </div>
</div></body></html>

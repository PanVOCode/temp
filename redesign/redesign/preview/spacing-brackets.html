<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .frame { position:relative; width:200px; height:90px; }
  .c { position:absolute; width:16px; height:16px; }
  .tl { top:0; left:0; border-top:1px solid #000; border-left:1px solid #000; }
  .br { bottom:0; right:0; border-bottom:1px solid #000; border-right:1px solid #000; }
  .plus { position:absolute; top:-7px; left:50%; transform:translateX(-50%); color:var(--atpm-accent); font-size:12px; }
  .ftxt { position:absolute; top:50%; left:14px; transform:translateY(-50%); }
  .cross { position:relative; width:54px; height:54px; }
  .cross::before { content:''; position:absolute; top:50%; left:0; right:0; height:1px; background:rgba(255,106,0,0.5); }
  .cross::after { content:''; position:absolute; left:50%; top:0; bottom:0; width:1px; background:rgba(255,106,0,0.5); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Technical brackets &amp; crosshair</div>
  <div class="row" style="gap:36px; align-items:center;">
    <div class="frame">
      <span class="c tl"></span><span class="c br"></span><span class="plus">+</span>
      <div class="ftxt"><div style="font-size:9px;font-weight:500;letter-spacing:0.12em;">АДДИТЕХПРОММАШ / 2026</div><div class="atpm-tag" style="font-size:8px;">MOLD ENGINEERING</div></div>
    </div>
    <div class="cross"></div>
  </div>
</div></body></html>

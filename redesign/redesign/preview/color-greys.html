<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .sw { display:flex; flex-direction:column; gap:0; flex:1; }
  .chip { height:50px; }
  .meta { padding:6px 2px 0; }
  .hx { font-size:9px; letter-spacing:0.1em; color:var(--atpm-grey-50); display:block; }
  .nm { font-size:9px; font-weight:700; letter-spacing:0.1em; }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Greys &amp; dark panels</div>
  <div class="row" style="gap:6px; align-items:stretch;">
    <div class="sw"><div class="chip" style="background:#333;"></div><div class="meta"><span class="nm">90</span><span class="hx">#333</span></div></div>
    <div class="sw"><div class="chip" style="background:#555;"></div><div class="meta"><span class="nm">70</span><span class="hx">#555</span></div></div>
    <div class="sw"><div class="chip" style="background:#666;"></div><div class="meta"><span class="nm">60</span><span class="hx">#666</span></div></div>
    <div class="sw"><div class="chip" style="background:#888;"></div><div class="meta"><span class="nm">50</span><span class="hx">#888</span></div></div>
    <div class="sw"><div class="chip" style="background:#999;"></div><div class="meta"><span class="nm">40</span><span class="hx">#999</span></div></div>
    <div class="sw"><div class="chip" style="background:#AAA;"></div><div class="meta"><span class="nm">20</span><span class="hx">#AAA</span></div></div>
    <div class="sw"><div class="chip" style="background:#0A0A0A;"></div><div class="meta"><span class="nm">STEEL</span><span class="hx">#0A0A0A</span></div></div>
    <div class="sw"><div class="chip" style="background:#060606;"></div><div class="meta"><span class="nm">STEEL2</span><span class="hx">#060606</span></div></div>
  </div>
</div></body></html>

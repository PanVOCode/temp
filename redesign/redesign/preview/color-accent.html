<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .demo { display:flex; align-items:center; gap:26px; flex-wrap:wrap; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .lab { font-size:8px; letter-spacing:0.2em; text-transform:uppercase; color:var(--atpm-grey-50); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow atpm-eyebrow--accent">Accent in use — rationed orange</div>
  <div class="demo">
    <div class="item"><span style="width:6px;height:6px;background:var(--atpm-accent);display:block;"></span><span class="lab">Logo dot</span></div>
    <div class="item"><span style="width:40px;height:3px;background:var(--atpm-accent);display:block;"></span><span class="lab">Rule</span></div>
    <div class="item"><span style="width:6px;height:6px;border-radius:50%;background:var(--atpm-accent);display:block;"></span><span class="lab">Status</span></div>
    <div class="item"><span class="atpm-figure" style="font-size:40px;">30+</span><span class="lab">Figure</span></div>
    <div class="item"><span style="display:inline-flex;align-items:center;gap:8px;color:var(--atpm-accent);font-weight:800;font-size:11px;letter-spacing:0.2em;">СВЯЗАТЬСЯ<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></span><span class="lab">Hover</span></div>
  </div>
</div></body></html>

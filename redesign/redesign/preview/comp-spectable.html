<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .row2 { display:flex; justify-content:space-between; align-items:baseline; padding:11px 0; border-bottom:1px solid var(--atpm-line-08); gap:16px; }
  .k { font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--atpm-grey-50); }
  .val { font-size:12px; font-weight:500; color:#000; text-align:right; }
</style></head>
<body><div class="card" style="gap:6px;">
  <div class="atpm-eyebrow">Spec table</div>
  <div class="col">
    <div class="row2"><span class="k">Материал</span><span class="val">P20 · H13 · S136</span></div>
    <div class="row2"><span class="k">Гнёзд</span><span class="val">1 — 32</span></div>
    <div class="row2"><span class="k">Точность</span><span class="val">±0.01 мм · IT6–IT7</span></div>
    <div class="row2" style="border-bottom:none;"><span class="k">Ресурс</span><span class="val" style="color:var(--atpm-accent);">до 1 000 000 циклов</span></div>
  </div>
</div></body></html>

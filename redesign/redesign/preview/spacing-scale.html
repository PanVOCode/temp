<!-- @dsCard group="Spacing" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .s { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background:var(--atpm-accent); width:22px; }
  .v { font-size:9px; letter-spacing:0.1em; color:var(--atpm-grey-50); }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Spacing scale</div>
  <div class="row" style="gap:14px; align-items:flex-end;">
    <div class="s"><div class="bar" style="height:4px;"></div><span class="v">4</span></div>
    <div class="s"><div class="bar" style="height:8px;"></div><span class="v">8</span></div>
    <div class="s"><div class="bar" style="height:12px;"></div><span class="v">12</span></div>
    <div class="s"><div class="bar" style="height:16px;"></div><span class="v">16</span></div>
    <div class="s"><div class="bar" style="height:24px;"></div><span class="v">24</span></div>
    <div class="s"><div class="bar" style="height:32px;"></div><span class="v">32</span></div>
    <div class="s"><div class="bar" style="height:48px;"></div><span class="v">48</span></div>
    <div class="s"><div class="bar" style="height:64px;"></div><span class="v">64</span></div>
    <div class="s"><div class="bar" style="height:80px;"></div><span class="v">96</span></div>
  </div>
</div></body></html>

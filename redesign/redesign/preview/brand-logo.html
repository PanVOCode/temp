<!-- @dsCard group="Brand" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css"></head>
<body><div class="card">
  <div class="atpm-eyebrow">Logo lockup</div>
  <div class="row" style="gap:10px;">
    <span style="width:7px;height:7px;background:var(--atpm-accent);display:block;"></span>
    <span style="font-weight:800;font-size:22px;letter-spacing:-0.01em;text-transform:uppercase;color:#000;line-height:1;">АДДИТЕХПРОММАШ</span>
  </div>
  <div class="row" style="gap:10px; margin-top:6px;">
    <span style="width:7px;height:7px;background:#fff;display:block;"></span>
    <span style="font-weight:800;font-size:22px;letter-spacing:-0.01em;text-transform:uppercase;color:#fff;line-height:1;background:#000;padding:6px 0;"></span>
  </div>
  <div style="display:inline-flex;align-items:center;gap:10px;background:#000;padding:10px 14px;width:fit-content;">
    <span style="width:7px;height:7px;background:var(--atpm-accent);display:block;"></span>
    <span style="font-weight:800;font-size:18px;letter-spacing:-0.01em;text-transform:uppercase;color:#fff;line-height:1;">АДДИТЕХПРОММАШ</span>
  </div>
</div></body></html>

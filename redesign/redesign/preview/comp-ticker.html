<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  body { background:#000; }
  .card { background:#000; }
  .ticker { background:#000; border-top:1px solid #1A1A1A; border-bottom:1px solid #1A1A1A; height:46px; display:flex; align-items:center; overflow:hidden; }
  .ti { display:inline-flex; align-items:center; font-weight:800; font-size:10px; letter-spacing:0.28em; text-transform:uppercase; color:rgba(255,255,255,0.45); white-space:nowrap; }
  .sep { color:var(--atpm-accent); opacity:0.7; margin:0 16px; }
</style></head>
<body><div class="card" style="padding:26px;">
  <div class="atpm-eyebrow" style="color:rgba(255,255,255,0.6);">Marquee ticker</div>
  <div class="ticker">
    <div class="ti" style="padding-left:8px;">ПРОЕКТИРОВАНИЕ ПРЕСС-ФОРМ<span class="sep">·</span>АДДИТИВНЫЕ ТЕХНОЛОГИИ<span class="sep">·</span>DMLS · SLM · FDM<span class="sep">·</span>СРОКИ — НЕДЕЛИ<span class="sep">·</span>ДЕШЕВЛЕ КИТАЯ<span class="sep">·</span>ВЛАДИМИР · РОССИЯ<span class="sep">·</span></div>
  </div>
</div></body></html>

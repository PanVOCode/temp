<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="_card.css">
<style>
  .ramp { display:flex; flex-direction:column; gap:2px; }
  .lvl { display:flex; align-items:baseline; gap:16px; border-bottom:1px solid var(--atpm-line-08); padding:4px 0; }
  .lvl b { font-weight:800; font-stretch:expanded; color:#000; line-height:1; }
  .tk { font-size:9px; letter-spacing:0.18em; text-transform:uppercase; color:var(--atpm-grey-50); margin-left:auto; }
</style></head>
<body><div class="card">
  <div class="atpm-eyebrow">Type scale</div>
  <div class="ramp">
    <div class="lvl"><b style="font-size:34px;">Aa</b><span class="atpm-tag">D1 · 56–120</span><span class="tk">800 EXP</span></div>
    <div class="lvl"><b style="font-size:26px;">Aa</b><span class="atpm-tag">D2 · 36–72</span><span class="tk">800 EXP</span></div>
    <div class="lvl"><b style="font-size:18px;">Aa</b><span class="atpm-tag">H2 · 20–30</span><span class="tk">700</span></div>
    <div class="lvl"><b style="font-size:14px; font-weight:400; font-stretch:normal;">Aa</b><span class="atpm-tag">Body · 14–16</span><span class="tk">400</span></div>
    <div class="lvl"><b style="font-size:10px; font-weight:300; font-stretch:normal; letter-spacing:0.25em;">EYEBROW</b><span class="atpm-tag">Label · 9–10</span><span class="tk">300–500</span></div>
  </div>
</div></body></html>

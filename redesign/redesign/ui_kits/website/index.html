<!DOCTYPE html>
<!-- @dsCard group="UI Kit — Website" name="Website UI Kit" subtitle="Interactive ATPM marketing site — hero, panels, modals" viewport="1280x620" -->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>АДДИТЕХПРОММАШ — Пресс-формы для литья пластмасс</title>
  <link rel="icon" href="../../assets/logo-mark.svg" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="sections.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="atpm-grain-fixed">
  <div id="root"></div>

  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="Chrome.jsx"></script>
  <script type="text/babel" src="Modals.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [modal, setModal] = useState(null); // 'phone' | 'quote' | null
      useEffect(() => {
        window.__openPhone = () => setModal('phone');
        window.__openQuote = () => setModal('quote');
        const onKey = (e) => { if (e.key === 'Escape') setModal(null); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, []);

      // reveal is handled by CSS animation (see styles.css); no JS needed

      useEffect(() => {
        document.body.style.overflow = modal ? 'hidden' : '';
      }, [modal]);

      return (
        <React.Fragment>
          <Nav />
          <main>
            <Hero />
            <Ticker />
            <About />
            <Specs />
            <Stats />
            <Process />
            <Benefits />
            <CTA />
          </main>
          <Footer />
          {modal === 'phone' && <PhoneModal onClose={() => setModal(null)} />}
          {modal === 'quote' && <QuoteModal onClose={() => setModal(null)} />}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>

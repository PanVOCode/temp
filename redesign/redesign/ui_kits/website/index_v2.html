            <div className="v2-field"><label>Изделие / задача</label><input placeholder="Корпус, 4 гнезда, горячий канал…"/></div>
            <button className="btn btn-accent" type="submit" style={{justifyContent:'center',marginTop:4}}>Отправить заявку <Arr/></button>
            <p className="v2-msub" style={{textAlign:'center',margin:0}}>Или пришлите чертёж: additechprommash@yandex.ru</p>
          </form>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function App() {
  const [modal, setModal] = useState(null);
  useEffect(() => {
    const onKey = e => { if(e.key==='Escape') setModal(null); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, []);
  useEffect(() => { document.body.style.overflow = modal ? 'hidden' : ''; }, [modal]);
  const openPhone = () => setModal('phone');
  const openQuote = () => setModal('quote');
  return (
    <React.Fragment>
      <Nav onPhone={openPhone} onQuote={openQuote}/>
      <main>
        <Hero onPhone={openPhone} onQuote={openQuote}/>
        <Strip/>
        <Ticker/>
        <Why/>
        <Specs onQuote={openQuote} onPhone={openPhone}/>
        <Tech/>
        <Works/>
        <Process/>
        <CTA onPhone={openPhone} onQuote={openQuote}/>
      </main>
      <Footer onPhone={openPhone}/>
      {modal==='phone' && <PhoneModal onClose={()=>setModal(null)}/>}
      {modal==='quote' && <QuoteModal onClose={()=>setModal(null)}/>}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
